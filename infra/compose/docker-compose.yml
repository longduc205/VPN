services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../:/app
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/backend
      - DATABASE_URL=postgresql://vpn:vpn@postgres:5432/vpn
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../../frontend:/app
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
